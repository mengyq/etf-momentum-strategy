name: ETF动量策略 - 信号推送
on:
  schedule:
    - cron: '30 1 * * 1'      # 周一 09:30 CST
    - cron: '0 7 * * 1-5'     # 每天 15:00 CST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install alphafeed pandas numpy requests
      - name: Run strategy signal
        run: python cloud_strategy.py --signal --report --email
        env:
          ALPHAFEED_API_KEY: ${{ secrets.ALPHAFEED_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
